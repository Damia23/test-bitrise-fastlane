---
format_version: '26'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native
workflows:
  deploy:
    description: |
      Runs a build on Expo Application Services (EAS).

      Next steps:
      - Configure the `Run Expo Application Services (EAS) build` Step's `Access Token` input.
      - Check out [Getting started with Expo apps](https://docs.bitrise.io/en/bitrise-ci/getting-started/quick-start-guides/getting-started-with-expo-projects.html).
      - For an alternative deploy workflow checkout the [(React Native) Expo: Build using Turtle CLI recipe](https://github.com/bitrise-io/workflow-recipes/blob/main/recipes/rn-expo-turtle-build.md).
    steps:
    - git-clone@8: {}
    - npm@3:
        title: npm install
        inputs:
        - command: install
    - run-eas-build@0:
        inputs:
        - platform: "$PLATFORM"
    - deploy-to-bitrise-io@2: {}
  primary:
    description: |
      Installs dependencies.

      Next steps:
      - Add tests to your project and configure the workflow to run them.
      - Check out [Getting started with Expo apps](https://docs.bitrise.io/en/bitrise-ci/getting-started/quick-start-guides/getting-started-with-expo-projects.html).
    steps:
    - git-clone@8: {}
    - restore-npm-cache@3: {}
    - npm@3:
        title: npm install
        inputs:
        - command: install
    - save-npm-cache@1: {}
    - script@1:
        title: Run Expo Prebuild
        inputs:
          - content: |-
              #!/usr/bin/env bash
              # fail if any command fails
              set -e
              
              # Run prebuild to generate ios and android folders
              npx expo prebuild --clean

    - android-build@1:
        inputs:
        - variant: staging
        - build_type: apk
        - project_location: 'android'
    - sign-apk@1: {}
    - deploy-to-bitrise-io@2: {}
    triggers:
      push:
      - branch: main
      pull_request:
      - source_branch: "*"
meta:
  bitrise.io:
    stack: osx-xcode-26.5.x
    machine_type_id: g2.mac.large
app:
  envs:
  - PLATFORM: all
    opts:
      is_expand: false
pipelines:
  staging:
    workflows:
      primary: {}
